name: dllni_user_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  common_package:
    path: common_package

  easy_localization: ^3.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.1
  injectable: ^2.7.1+4
  get_it: ^8.2.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  awesome_notifications: ^0.11.0
  flutter_svg: ^2.0.10
  tab_indicator_styler: ^2.0.0
  image_picker: ^1.2.1
  toastification: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.7.1
  injectable_generator: ^2.12.1


flutter:

  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg


  fonts:
    - family: cairo
      fonts:
        - asset: assets/fonts/cairo.ttf

  assets:
    - assets/translations/
    - assets/images/
