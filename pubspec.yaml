name: dllni_user_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  common_package:
    path: common_package

  easy_localization: ^3.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.1
  injectable: ^2.7.1+4
  get_it: ^8.2.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  awesome_notifications: ^0.11.0
  font_awesome_flutter: ^11.0.0
  geolocator: ^12.0.0
  intl: ^0.20.2
  injectable_generator: ^2.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.7.1


flutter:

  uses-material-design: true


  assets:
    - assets/translations/
    - assets/images/

  fonts:
    - family: cairo
      fonts:
        - asset: assets/fonts/cairo.ttf
